<!DOCTYPE html>
<!--
  Open this file in a browser to generate PWA icons.
  Right-click each canvas and "Save image as" icon-192.png / icon-512.png
-->
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(id, size) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const r = size * 0.15;

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, '#f97316');
  bg.addColorStop(1, '#fb7185');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Emoji
  ctx.font = `${size * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍱', size / 2, size / 2);
}

drawIcon('c192', 192);
drawIcon('c512', 512);
</script>
</body>
</html>
